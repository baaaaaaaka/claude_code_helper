name: Build glibc compat bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches: ["main"]
    paths:
      - "scripts/glibc/**"
      - ".github/workflows/glibc-compat-build.yml"

permissions:
  contents: write

concurrency:
  group: glibc-compat-build
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish glibc 2.31 compat bundle
    runs-on: ubuntu-latest
    env:
      GLIBC_COMPAT_TAG: "glibc-compat-v2.31.1"
      GLIBC_COMPAT_BUNDLE: "glibc-2.31-centos7-runtime-cxx-x86_64.tar.xz"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CentOS7 glibc compat bundle
        shell: bash
        timeout-minutes: 25
        run: |
          set -euo pipefail
          mkdir -p dist/glibc-compat
          OUT_DIR="$PWD/dist/glibc-compat" JOBS=4 bash scripts/glibc/build_glibc_231_centos7.sh

      - name: Verify bundle checksum file
        shell: bash
        run: |
          set -euo pipefail
          cd dist/glibc-compat
          test -f "$GLIBC_COMPAT_BUNDLE"
          test -f "$GLIBC_COMPAT_BUNDLE.sha256"
          expected="$(awk '{
            for (i = 1; i <= NF; i++) {
              if ($i ~ /^[0-9A-Fa-f]{64}$/) {
                print tolower($i)
                exit
              }
            }
          }' "$GLIBC_COMPAT_BUNDLE.sha256")"
          if [ -z "$expected" ]; then
            echo "Missing SHA256 in $GLIBC_COMPAT_BUNDLE.sha256" >&2
            exit 1
          fi
          actual="$(sha256sum "$GLIBC_COMPAT_BUNDLE" | awk '{print tolower($1)}')"
          if [ "$actual" != "$expected" ]; then
            echo "SHA256 mismatch for $GLIBC_COMPAT_BUNDLE" >&2
            echo "expected=$expected" >&2
            echo "actual=$actual" >&2
            exit 1
          fi

      - name: Verify bundled C++ runtime
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="$(mktemp -d)"
          trap 'rm -rf "$stage_dir"' EXIT
          tar -C "$stage_dir" -xJf "dist/glibc-compat/$GLIBC_COMPAT_BUNDLE"
          lib_dir="$stage_dir/glibc-2.31/lib"
          test -f "$lib_dir/libstdc++.so.6"
          test -f "$lib_dir/libgcc_s.so.1"
          grep -aq 'GLIBCXX_3.4.21' "$lib_dir/libstdc++.so.6"
          max_glibc() {
            local file="$1"
            objdump -T "$file" \
              | awk '/GLIBC_2\./{gsub(/[()]/, "", $5); print $5}' \
              | sort -Vu \
              | tail -n 1
          }
          check_max_glibc() {
            local file="$1"
            local allowed="$2"
            local actual
            actual="$(max_glibc "$file")"
            if [ -n "$actual" ] && [ "$(printf '%s\n%s\n' "$actual" "$allowed" | sort -V | tail -n 1)" != "$allowed" ]; then
              echo "$file depends on $actual, expected <= $allowed" >&2
              exit 1
            fi
          }
          check_max_glibc "$lib_dir/libstdc++.so.6" "GLIBC_2.31"
          check_max_glibc "$lib_dir/libgcc_s.so.1" "GLIBC_2.31"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: glibc-compat-bundle
          path: |
            dist/glibc-compat/${{ env.GLIBC_COMPAT_BUNDLE }}
            dist/glibc-compat/${{ env.GLIBC_COMPAT_BUNDLE }}.sha256

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$GLIBC_COMPAT_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GLIBC_COMPAT_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "glibc compat bundle v2.31.1" \
              --notes "Automated CentOS7-compatible glibc 2.31 runtime bundle with vendored libstdc++/libgcc for Claude startup smoke tests."
          fi

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$GLIBC_COMPAT_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "dist/glibc-compat/$GLIBC_COMPAT_BUNDLE" \
            "dist/glibc-compat/$GLIBC_COMPAT_BUNDLE.sha256" \
            --clobber
