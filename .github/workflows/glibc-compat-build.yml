name: Build glibc compat assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches: ["main"]
    paths:
      - "scripts/glibc/**"
      - ".github/workflows/glibc-compat-build.yml"

permissions:
  contents: write

concurrency:
  group: glibc-compat-build
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish glibc 2.31 compat assets
    runs-on: ubuntu-latest
    env:
      GLIBC_COMPAT_TAG: "glibc-compat-v2.31"
      GLIBC_COMPAT_BUNDLE: "glibc-2.31-centos7-runtime-x86_64.tar.xz"
      PATCHELF_SOURCE_URL: "https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0-x86_64.tar.gz"
      PATCHELF_ASSET: "patchelf-linux-x86_64-static"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CentOS7 glibc compat bundle
        shell: bash
        timeout-minutes: 25
        run: |
          set -euo pipefail
          mkdir -p dist/glibc-compat
          OUT_DIR="$PWD/dist/glibc-compat" JOBS=4 bash scripts/glibc/build_glibc_231_centos7.sh

      - name: Prepare patchelf helper asset
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$PWD/dist/glibc-compat" \
          PATCHELF_SOURCE_URL="$PATCHELF_SOURCE_URL" \
          PATCHELF_ASSET="$PATCHELF_ASSET" \
          bash scripts/glibc/prepare_patchelf_helper.sh

      - name: Verify helper asset checksum files
        shell: bash
        run: |
          set -euo pipefail
          cd dist/glibc-compat
          for asset in "$GLIBC_COMPAT_BUNDLE" "$PATCHELF_ASSET"; do
            test -f "$asset"
            test -f "$asset.sha256"
            expected="$(awk '{
              for (i = 1; i <= NF; i++) {
                if ($i ~ /^[0-9A-Fa-f]{64}$/) {
                  print tolower($i)
                  exit
                }
              }
            }' "$asset.sha256")"
            if [ -z "$expected" ]; then
              echo "Missing SHA256 in $asset.sha256" >&2
              exit 1
            fi
            actual="$(sha256sum "$asset" | awk '{print tolower($1)}')"
            if [ "$actual" != "$expected" ]; then
              echo "SHA256 mismatch for $asset" >&2
              echo "expected=$expected" >&2
              echo "actual=$actual" >&2
              exit 1
            fi
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: glibc-compat-assets
          path: |
            dist/glibc-compat/${{ env.GLIBC_COMPAT_BUNDLE }}
            dist/glibc-compat/${{ env.GLIBC_COMPAT_BUNDLE }}.sha256
            dist/glibc-compat/${{ env.PATCHELF_ASSET }}
            dist/glibc-compat/${{ env.PATCHELF_ASSET }}.sha256

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$GLIBC_COMPAT_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release create "$GLIBC_COMPAT_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "glibc compat bundle v2.31" \
              --notes "Automated helper assets for Claude startup smoke tests, including a CentOS7-compatible glibc 2.31 runtime bundle and a static patchelf helper."
          fi

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$GLIBC_COMPAT_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "dist/glibc-compat/$GLIBC_COMPAT_BUNDLE" \
            "dist/glibc-compat/$GLIBC_COMPAT_BUNDLE.sha256" \
            "dist/glibc-compat/$PATCHELF_ASSET" \
            "dist/glibc-compat/$PATCHELF_ASSET.sha256" \
            --clobber
