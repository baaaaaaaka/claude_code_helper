name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CLAUDE_PROXY_EXE_PATCH: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Install extra shells for installer tests (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zsh fish csh tcsh

      - name: gofmt (verify)
        shell: bash
        run: |
          bad="$(gofmt -l .)"
          if [ -n "$bad" ]; then
            echo "gofmt required for:"
            echo "$bad"
            exit 1
          fi

      - name: Setup SSHD for integration tests (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openssh-server
          sudo mkdir -p /run/sshd
          SSH_TEST_USER="ssh-test"
          if ! id -u "$SSH_TEST_USER" >/dev/null 2>&1; then
            sudo useradd -m -s /bin/bash -p '$6$ci$WiNqQDjl.EMvmwex4uixbzCpYwPdZ5pjMhtV6AMb004JamOVMOgqYaNOYOgWVmv/1Eq9TSb.yuZ94xGrgVNuS/' "$SSH_TEST_USER"
          fi
          SSH_TEST_DIR="$(mktemp -d)"
          ssh-keygen -t ed25519 -N "" -f "$SSH_TEST_DIR/host_key"
          ssh-keygen -t ed25519 -N "" -f "$SSH_TEST_DIR/test_key"
          sudo install -d -m 700 -o "$SSH_TEST_USER" -g "$SSH_TEST_USER" "/home/$SSH_TEST_USER/.ssh"
          sudo install -m 600 -o "$SSH_TEST_USER" -g "$SSH_TEST_USER" "$SSH_TEST_DIR/test_key.pub" "/home/$SSH_TEST_USER/.ssh/authorized_keys"
          chmod 700 "$SSH_TEST_DIR"
          chmod 600 "$SSH_TEST_DIR/test_key" "$SSH_TEST_DIR/test_key.pub" "$SSH_TEST_DIR/host_key"
          cat > "$SSH_TEST_DIR/sshd_config" <<EOF
          Port 22222
          ListenAddress 127.0.0.1
          HostKey $SSH_TEST_DIR/host_key
          AuthorizedKeysFile /home/$SSH_TEST_USER/.ssh/authorized_keys
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          KbdInteractiveAuthentication no
          UsePAM no
          PermitRootLogin no
          PubkeyAuthentication yes
          StrictModes no
          AllowTcpForwarding yes
          PermitOpen any
          PidFile $SSH_TEST_DIR/sshd.pid
          AllowUsers ${SSH_TEST_USER}
          LogLevel ERROR
          EOF
          sudo /usr/sbin/sshd -t -f "$SSH_TEST_DIR/sshd_config"
          sudo /usr/sbin/sshd -f "$SSH_TEST_DIR/sshd_config"
          for i in {1..20}; do
            if ssh -i "$SSH_TEST_DIR/test_key" -p 22222 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes \
              "${SSH_TEST_USER}@127.0.0.1" exit; then
              break
            fi
            sleep 0.2
          done
          echo "SSH_TEST_ENABLED=1" >> "$GITHUB_ENV"
          echo "SSH_TEST_HOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "SSH_TEST_PORT=22222" >> "$GITHUB_ENV"
          echo "SSH_TEST_USER=${SSH_TEST_USER}" >> "$GITHUB_ENV"
          echo "SSH_TEST_KEY=$SSH_TEST_DIR/test_key" >> "$GITHUB_ENV"

      - name: go vet
        run: go vet ./...

      - name: go test (with coverage)
        shell: bash
        run: |
          go test -coverprofile=coverage.out ./...

      - name: Run-json/IO regression suite
        shell: bash
        run: |
          go test ./internal/cli \
            -run '^(Test(LoadClaudeRunJSONSpec|RunJSONCmd|RunClaudeJSONSpec|ResolveRunJSONProxyPreference|HasExplicitClaudePermissionArgs|RunTargetOnceWith(FileRunTargetIO|PrepareIODisablesTTYPreserve|HeadlessFileRunTargetIOUsesDevNullDefaults)|RunTargetWithFallback(ArchivesRetryOutputs|RuntimeYoloRetryWithCustomIO)|ArchiveRunTargetOutput|NewFileRunTargetIOWithOptions|AppendFileWriter))$' \
            -count=1

      - name: History/TUI regression suite
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/claudehistory ./internal/tui \
            -run '^(TestDiscoverProjects(ReturnsProjectsAlongsideFirstError|ContextHonorsCancellation|RepeatedLoadsMatchExactly|SkipsSnapshotOnlySessionsEvenWhenIndexHasMetadata|ModesMatchExactly|ModesMatchExactlyWithIndexedExternalFullPath|ParallelSessionMetaPersistentCacheWarmHitAcrossShards|DisablesProjectCacheWhenHistoryIndexReadFails|ProjectCache(WarmHitAvoidsSessionMetaReads|WarmHitOnlyRereadsChangedProject|WarmHitRevalidatesInventoryBeforeReturn|Invalidates(On(HistoryChange|NewSessionFile|IndexChange|ProjectPathDirStateChange|AgentFileChange|IndexedExternalFullPathChange)|WhenFilteredIndexedExternalFullPathBecomesVisible)|MissesAfterSessionReplacementWithSameMtime|MissesWhen(IndexBecomesUnreadable|SessionBecomesUnreadable))|ParallelPreservesFirstErrorOrdering)|TestLoadHistoryIndex(ContextHonorsCancellation|PersistentCache(WarmStartMatchesColdLoad|IgnoresCorruptFile|MissesAfterReplacementWithSameMtime))|TestSession(FileCacheInvalidatesOnFileReplacementWithSameMtime|MetaPersistentCache(WarmStartMatchesColdLoad|IgnoresCorruptFile|MissesAfterReplacementWithSameMtime))|TestReadPersistentProjectCacheFileIgnoresOlderSchemaVersion|TestContextAwareSessionFileHelpersHonorCancellation|TestAttachSubagentsContextHonorsCancellation|TestLoadProjectFromSessionFilesWithOptionsContextHonorsCancellation|TestPostUIEventWithRetryRetriesQueueFull|TestHandleKeyIgnoresActionsWhileProjectsLoading|TestSelectSession(LoadsProjectsAsync|KeepsPartialProjectsOnInitialLoadError|StartsRefreshAfterInitialLoadCompletes)|TestDrawKeepsLoadingStatusOverUpdateError)$' \
            -count=1

      - name: History CLI cancellation regression
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli -run '^(TestHistory(List|Show|Open)CmdCancellationIsFatal)$' -count=1

      - name: YOLO fallback regression suite
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli \
            -run '^(TestRunTargetWithFallbackCallsPatchFallbackOnStartupRollback|TestRunClaude(Session|NewSession)(FallsBackTo(RulesWhenNoFlagsExposed|OffWhenAutoRulesPatchDoesNotActivate)|KeepsYoloOffAfterAutoRulesStartupRollback))$' \
            -count=1

      - name: Managed Claude regression suite
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/cli \
            -run '^(TestFindManagedClaudePath(FallsBackToUnixMigratedLocalInstall|FallsBackToUserHomeDirWhenHomeEnvMissing|IncludesRecoveredLauncher(|WithoutHomeEnv))|TestFindInstalledClaudePathPrefersLookPathWhenManagedLocationMissing|TestEnsureClaudeInstalled(IgnoresPathClaudeAndUsesManagedInstall|ReusesRecoveredLauncher|ExportsGitBashBeforeReturningManagedWindowsInstall|ReturnsExportGitBashError)|TestBuildClaudeResumeCommand(UsesManagedClaudeWhenUnset|UsesManagedClaudeViaUserHomeFallbackWhenEnvMissing|UsesRecoveredLauncherWhenHomeEnvMissing))$' \
            -count=1

      - name: Proc cross-platform compile smoke (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="${RUNNER_TEMP:-/tmp}"
          GOOS=windows GOARCH=amd64 go test -c -o "$tmp_dir/proc-windows.test.exe" ./internal/proc
          GOOS=darwin GOARCH=amd64 go test -c -o "$tmp_dir/proc-darwin.test" ./internal/proc

      - name: Claudehistory cross-platform compile smoke (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="${RUNNER_TEMP:-/tmp}"
          GOOS=darwin GOARCH=amd64 go test -c -o "$tmp_dir/claudehistory-darwin.test" ./internal/claudehistory
          GOOS=freebsd GOARCH=amd64 go test -c -o "$tmp_dir/claudehistory-freebsd.test" ./internal/claudehistory
          GOOS=netbsd GOARCH=amd64 go test -c -o "$tmp_dir/claudehistory-netbsd.test" ./internal/claudehistory
          GOOS=openbsd GOARCH=amd64 go test -c -o "$tmp_dir/claudehistory-openbsd.test" ./internal/claudehistory
          GOOS=dragonfly GOARCH=amd64 go test -c -o "$tmp_dir/claudehistory-dragonfly.test" ./internal/claudehistory

      - name: Installer script matrix smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          go test . -run 'TestInstallSh' -count=1

      - name: Installer script matrix smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          go test . -run '^TestInstallPs1' -count=1

      - name: Resolve Claude release bucket
        shell: bash
        run: |
          set -euo pipefail
          info="$(scripts/claude_release_info.sh)"
          bucket="$(printf "%s\n" "$info" | awk -F= '/^gcs_bucket=/{print $2}')"
          if [ -z "$bucket" ]; then
            echo "Failed to resolve Claude release bucket" >&2
            exit 1
          fi
          echo "CLAUDE_PATCH_BUCKET=$bucket" >> "$GITHUB_ENV"

      - name: Load Claude patch version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cat scripts/claude_patch_version.txt | tr -d '\r\n')"
          if [ -z "$version" ]; then
            echo "Missing Claude patch version in scripts/claude_patch_version.txt" >&2
            exit 1
          fi
          echo "CLAUDE_PATCH_VERSION=$version" >> "$GITHUB_ENV"

      - name: Claude patch smoke (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CLAUDE_PATCH_TEST: "1"
        run: |
          go test ./internal/cli -run '^TestClaudePatch(Integration(|RetriesKnownFailure)|RulesIntegration|BypassRuntimeIntegration)$' -count=1

      - name: Claude patch smoke (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CLAUDE_PATCH_TEST: "1"
        run: |
          go test ./internal/cli -run '^TestClaudePatch(Integration(|RetriesKnownFailure)|RulesIntegration|BypassRuntimeIntegration)$' -count=1

      - name: Claude patch proxy bypass smoke (Linux)
        if: runner.os == 'Linux'
        shell: bash
        timeout-minutes: 20
        env:
          CLAUDE_PATCH_PROXY_RUNTIME_TEST: "1"
          CLAUDE_PATCH_PROXY_PROFILE: "ci-ssh"
        run: |
          set -euo pipefail
          go test ./internal/cli -run '^TestClaudePatchBypassRuntimeIntegrationWithProxy$' -count=1

      - name: Claude patch smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CLAUDE_PATCH_TEST: "1"
        run: |
          go test ./internal/cli -run '^TestClaudePatch(Integration(|RetriesKnownFailure)|RulesIntegration|BypassRuntimeIntegration)$' -count=1

      - name: Claude install+launch smoke (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        timeout-minutes: 15
        env:
          CLAUDE_INSTALL_TEST: "1"
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            if go test ./internal/cli -run TestClaudeInstallLaunchIntegration -count=1; then
              exit 0
            fi
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            echo "Retrying Claude install+launch smoke after transient failure..."
            sleep 3
          done

      - name: Claude install+launch smoke (Windows realistic env)
        if: runner.os == 'Windows'
        shell: pwsh
        timeout-minutes: 20
        env:
          CLAUDE_INSTALL_TEST: "1"
          CLAUDE_INSTALL_TEST_NO_PATH_PRESEED: "1"
          CLAUDE_INSTALL_TEST_HIDE_WINDOWS_GIT_BASH: "1"
          CLAUDE_INSTALL_TEST_REQUIRE_WINDOWS_GIT_BASH_BOOTSTRAP: "1"
        run: |
          $ErrorActionPreference = "Stop"
          for ($attempt = 1; $attempt -le 2; $attempt++) {
            go test ./internal/cli -run TestClaudeInstallLaunchIntegration -count=1
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 0) {
              exit 0
            }
            if ($attempt -eq 2) {
              exit $exitCode
            }
            Write-Host "Retrying Claude install+launch smoke after transient failure..."
            Start-Sleep -Seconds 3
          }

      - name: go test -race (Linux only)
        if: runner.os == 'Linux'
        run: go test -race ./...

      - name: Coverage gate (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          threshold="25.0"
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$NF); print $NF}')"
          echo "Total coverage: ${total}% (threshold ${threshold}%)"
          awk -v total="$total" -v threshold="$threshold" 'BEGIN { if (total+0 < threshold+0) { printf("coverage %.2f%% < %.2f%%\n", total, threshold); exit 1 } }'

      - name: Upload coverage artifact (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  linux-distro-smoke:
    name: Linux distro smoke (CentOS7/Rocky8/Ubuntu20.04)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect glibc compat bundle changes
        id: glibc_compat_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rebuild:
              - 'scripts/glibc/**'
              - '.github/workflows/glibc-compat-build.yml'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache: true

      - name: Build static linux-amd64 binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/claude-proxy ./cmd/claude-proxy
          chmod +x dist/claude-proxy

      - name: Build linux install integration test binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test ./internal/cli -c -o dist/claude_cli_test
          chmod +x dist/claude_cli_test

      - name: Resolve Claude release bucket
        shell: bash
        run: |
          set -euo pipefail
          info="$(scripts/claude_release_info.sh)"
          bucket="$(printf "%s\n" "$info" | awk -F= '/^gcs_bucket=/{print $2}')"
          if [ -z "$bucket" ]; then
            echo "Failed to resolve Claude release bucket" >&2
            exit 1
          fi
          echo "CLAUDE_PATCH_BUCKET=$bucket" >> "$GITHUB_ENV"

      - name: Load Claude patch version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cat scripts/claude_patch_version.txt | tr -d '\r\n')"
          if [ -z "$version" ]; then
            echo "Missing Claude patch version in scripts/claude_patch_version.txt" >&2
            exit 1
          fi
          echo "CLAUDE_PATCH_VERSION=$version" >> "$GITHUB_ENV"

      - name: Smoke test in containers (doctor)
        shell: bash
        run: |
          set -euo pipefail
          for img in centos:7 rockylinux:8 ubuntu:20.04; do
            echo "==> $img"
            docker run --rm -v "$PWD/dist:/dist:ro" "$img" /dist/claude-proxy proxy doctor
          done

      - name: Smoke test in containers (Claude install+launch)
        shell: bash
        run: |
          set -euo pipefail
          for img in rockylinux:8 ubuntu:20.04; do
            echo "==> $img"
            docker run --rm \
              -v "$PWD/dist:/dist:ro" \
              -v "$PWD/scripts/ci:/ci:ro" \
              -e CLAUDE_INSTALL_TEST=1 \
              -e CI=true \
              "$img" bash /ci/container_claude_install_launch_smoke.sh
          done

      - name: Smoke test in containers (Claude native path on forced old kernel)
        shell: bash
        run: |
          set -euo pipefail
          for img in rockylinux:8 ubuntu:20.04; do
            echo "==> $img"
            docker run --rm \
              -v "$PWD/dist:/dist:ro" \
              -v "$PWD/scripts/ci:/ci:ro" \
              -e CLAUDE_INSTALL_TEST_FORCE_OLD_KERNEL_NATIVE=1 \
              -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallForcedOldKernelNativeIntegration \
              -e CI=true \
              "$img" bash /ci/container_claude_install_launch_smoke.sh
          done

      - name: Install strace for native Claude ENOSYS smoke
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y strace

      - name: Smoke test on runner (Claude native path on forced old kernel + ENOSYS)
        shell: bash
        run: |
          set -euo pipefail
          # This is still not a true <5.1 host-kernel run on GitHub-hosted infra.
          # It combines the helper's forced old-kernel path with syscall-level
          # ENOSYS injection so CI will fail if a newer native Claude build starts
          # hard-requiring one of the probed newer Linux syscalls at startup.
          CLAUDE_INSTALL_TEST_FORCE_OLD_KERNEL_NATIVE_ENOSYS=1 \
          CI=true \
          ./dist/claude_cli_test -test.run TestClaudeInstallForcedOldKernelNativeENOSYSIntegration -test.count=1 -test.v

      - name: Smoke test in containers (Claude npm fallback on forced old kernel)
        shell: bash
        run: |
          set -euo pipefail
          # These docker jobs still share the GitHub-hosted Ubuntu kernel, so
          # none of them are true <5.1 host-kernel coverage. Force the old-kernel
          # path here to keep the npm fallback exercised on representative
          # non-EL7 Linux userlands using the helper's production default,
          # which is pinned to the last Node-based Claude npm package.
          for img in rockylinux:8 ubuntu:20.04; do
            echo "==> $img"
            docker run --rm \
              -v "$PWD/dist:/dist:ro" \
              -v "$PWD/scripts/ci:/ci:ro" \
              -e CLAUDE_INSTALL_TEST_NPM_FALLBACK=1 \
              -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallNPMFallbackIntegration \
              -e CI=true \
              "$img" bash /ci/container_claude_install_launch_smoke.sh
          done

      - name: Smoke test in containers (Claude npm fallback with system Node toolchain)
        shell: bash
        run: |
          set -euo pipefail
          for img in rockylinux:8 ubuntu:20.04; do
            echo "==> $img"
            docker run --rm \
              -v "$PWD/dist:/dist:ro" \
              -v "$PWD/scripts/ci:/ci:ro" \
              -e CLAUDE_INSTALL_TEST_NPM_FALLBACK_SYSTEM_NODE=1 \
              -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallNPMFallbackSystemNodeIntegration \
              -e CLAUDE_INSTALL_NEEDS_NODE=1 \
              -e CI=true \
              "$img" bash /ci/container_claude_install_launch_smoke.sh
          done

      - name: Smoke test in containers (Claude npm fallback with system Node but no npm)
        shell: bash
        run: |
          set -euo pipefail
          for img in rockylinux:8 ubuntu:20.04; do
            echo "==> $img"
            docker run --rm \
              -v "$PWD/dist:/dist:ro" \
              -v "$PWD/scripts/ci:/ci:ro" \
              -e CLAUDE_INSTALL_TEST_NPM_FALLBACK_NODE_WITHOUT_NPM=1 \
              -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallNPMFallbackNodeWithoutNPMIntegration \
              -e CLAUDE_INSTALL_NEEDS_NODE=1 \
              -e CLAUDE_INSTALL_DROP_NPM=1 \
              -e CI=true \
              "$img" bash /ci/container_claude_install_launch_smoke.sh
          done

      - name: Build local glibc compat bundle for CentOS7 smoke tests
        if: steps.glibc_compat_changes.outputs.rebuild == 'true'
        shell: bash
        timeout-minutes: 25
        run: |
          set -euo pipefail
          mkdir -p dist/glibc-compat
          OUT_DIR="$PWD/dist/glibc-compat" JOBS=4 bash scripts/glibc/build_glibc_231_centos7.sh

      - name: Smoke test in CentOS7 (Claude npm fallback + glibc/C++ compat, local bundle)
        if: steps.glibc_compat_changes.outputs.rebuild == 'true'
        shell: bash
        timeout-minutes: 20
        env:
          CLAUDE_INSTALL_GLIBC_COMPAT_BUNDLE: "/dist/glibc-compat/glibc-2.31-centos7-runtime-cxx-x86_64.tar.xz"
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            -e CLAUDE_INSTALL_TEST_NPM_FALLBACK=1 \
            -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallNPMFallbackIntegration \
            -e CLAUDE_INSTALL_NEEDS_PATCHELF=1 \
            -e CLAUDE_INSTALL_NEEDS_TAR=1 \
            -e CLAUDE_INSTALL_GLIBC_COMPAT_BUNDLE \
            -e CI=true \
            centos:7 bash /ci/container_claude_install_launch_smoke.sh

      - name: Smoke test in CentOS7 (Claude npm fallback with system Node + glibc/C++ compat, local bundle)
        if: steps.glibc_compat_changes.outputs.rebuild == 'true'
        shell: bash
        timeout-minutes: 20
        env:
          CLAUDE_INSTALL_GLIBC_COMPAT_BUNDLE: "/dist/glibc-compat/glibc-2.31-centos7-runtime-cxx-x86_64.tar.xz"
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            -e CLAUDE_INSTALL_TEST_NPM_FALLBACK_SYSTEM_NODE=1 \
            -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallNPMFallbackSystemNodeIntegration \
            -e CLAUDE_INSTALL_NEEDS_NODE=1 \
            -e CLAUDE_INSTALL_NEEDS_PATCHELF=1 \
            -e CLAUDE_INSTALL_NEEDS_TAR=1 \
            -e CLAUDE_INSTALL_GLIBC_COMPAT_BUNDLE \
            -e CI=true \
            centos:7 bash /ci/container_claude_install_launch_smoke.sh

      - name: Smoke test in CentOS7 (Claude npm fallback with system Node but no npm + glibc/C++ compat, local bundle)
        if: steps.glibc_compat_changes.outputs.rebuild == 'true'
        shell: bash
        timeout-minutes: 20
        env:
          CLAUDE_INSTALL_GLIBC_COMPAT_BUNDLE: "/dist/glibc-compat/glibc-2.31-centos7-runtime-cxx-x86_64.tar.xz"
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            -e CLAUDE_INSTALL_TEST_NPM_FALLBACK_NODE_WITHOUT_NPM=1 \
            -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallNPMFallbackNodeWithoutNPMIntegration \
            -e CLAUDE_INSTALL_NEEDS_NODE=1 \
            -e CLAUDE_INSTALL_DROP_NPM=1 \
            -e CLAUDE_INSTALL_NEEDS_PATCHELF=1 \
            -e CLAUDE_INSTALL_NEEDS_TAR=1 \
            -e CLAUDE_INSTALL_GLIBC_COMPAT_BUNDLE \
            -e CI=true \
            centos:7 bash /ci/container_claude_install_launch_smoke.sh

      - name: Smoke test in CentOS7 (Claude npm fallback + glibc/C++ compat, release asset)
        if: steps.glibc_compat_changes.outputs.rebuild != 'true'
        shell: bash
        timeout-minutes: 20
        env:
          CLAUDE_PROXY_GLIBC_COMPAT_REPO: "baaaaaaaka/claude_code_helper"
          CLAUDE_PROXY_GLIBC_COMPAT_TAG: "glibc-compat-v2.31.1"
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts/ci:/ci:ro" \
            -e CLAUDE_INSTALL_TEST_NPM_FALLBACK=1 \
            -e CLAUDE_INSTALL_TEST_NAME=TestClaudeInstallNPMFallbackIntegration \
            -e CLAUDE_INSTALL_NEEDS_PATCHELF=1 \
            -e CLAUDE_INSTALL_NEEDS_TAR=1 \
            -e CLAUDE_PROXY_GLIBC_COMPAT_REPO \
            -e CLAUDE_PROXY_GLIBC_COMPAT_TAG \
            -e CI=true \
            centos:7 bash /ci/container_claude_install_launch_smoke.sh

      - name: Smoke test in CentOS7 (Claude npm fallback with system Node + glibc/C++ compat, release asset)
        if: steps.glibc_compat_changes.outputs.rebuild != 'true'
        shell: bash
